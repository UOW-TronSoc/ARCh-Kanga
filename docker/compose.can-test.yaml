services:
  can-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      args:
        USER_UID: ${KANGA_UID:-1000}
        USER_GID: ${KANGA_GID:-1000}
    image: kanga-dev:humble
    container_name: kanga-can-test
    network_mode: host
    ipc: host
    privileged: true
    stdin_open: true
    tty: true
    working_dir: /workspace
    command: bash
    volumes:
      - ..:/workspace
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
